# sucullu-koyu-web — statik multi-page hosting (SPA fallback YOK)
# Güvenlik başlıkları görsel/işlevsel parity'yi değiştirmez; CSP kararları
# docs/DEPLOYMENT.md içinde gerekçelendirilmiştir.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    absolute_redirect off;

    # gzip (medya zaten sıkıştırılmış; metin türleri)
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # --- Güvenlik başlıkları (always: hata yanıtları dahil) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), fullscreen=(self)" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    # CSP notları:
    # - style-src 'unsafe-inline': kaynak sitenin birebir kopyalanan inline
    #   <style> blokları (ana sayfa kamera bölümü, kamera duvarı) nedeniyle
    #   zorunlu; script'lerde inline YOKTUR ve unsafe-eval verilmez.
    # - connect-src/media-src: ileride kullanılacak HTTPS kamera origin'i
    #   (kameraizle.sucullukoyu.com) + hls.js blob/MSE gereksinimleri.
    # - worker-src blob:: hls.js enableWorker inline worker'ı.
    # - frame-src: Google Maps embed.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; media-src 'self' blob: https://kameraizle.sucullukoyu.com; connect-src 'self' https://kameraizle.sucullukoyu.com; worker-src 'self' blob:; frame-src https://www.google.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    # Dotfile erişimi kapalı
    location ~ /\. {
        deny all;
        return 404;
    }

    # Health endpoint (statik dosya; extensionless → text/plain)
    location = /healthz {
        default_type text/plain;
        access_log off;
        expires -1;
        try_files /healthz =404;
    }

    # HTML: kısa/no-cache (expires kullanımı add_header kalıtımını bozmaz)
    location = / {
        expires -1;
        try_files /index.html =404;
    }
    location ~* \.html$ {
        expires -1;
        try_files $uri =404;
    }

    # Vite hash'li bundle'lar: uzun cache.
    # NOT: location içinde add_header kullanılmaz — server seviyesindeki
    # güvenlik başlıklarının kalıtımını düşürür; yalnızca `expires` güvenlidir.
    location /assets/ {
        expires 365d;
        try_files $uri =404;
    }

    # Medya/font/vendor: kontrollü cache (hash'siz adlar — 30 gün)
    location ~ ^/(gorseller|fonts|vendor)/ {
        expires 30d;
        try_files $uri =404;
    }

    # Diğer her şey: dosya varsa sun, yoksa 404 (SPA fallback yok)
    location / {
        try_files $uri =404;
    }
}
